name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: TestPass123!
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build native
        run: cd native && cargo build --release
      - name: Clippy
        run: cd native && cargo clippy -- -D warnings
      - name: Go vet
        run: go vet ./...
      - name: Test
        run: CGO_ENABLED=1 go test -v ./...
        env:
          LD_LIBRARY_PATH: native/target/release
